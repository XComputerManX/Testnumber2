<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <LINK href="../Kod/textfieldtext.css" rel="stylesheet"
        type="text/CSS">
    </head>
    <body>
        Sposoby podłączania styli do strony<br>
        1)Zewnętrzny arkusz stylów.<br>
        <textarea disabled>
            <head> 
                <link rel="Stylesheet" type="text/css" href="style.css" /> 
            </head> 
        </textarea><br>
        2)Styl lokalny inaczej: (styl wpisany, liniowy, linijkowy, w linii)  czyli 
dopisanie arkusza do wybranego bloku treści strony.<br>
        <textarea disabled>
            <selektor style="cecha1: wartość1; cecha2: wartość2...">...</selektor> 
        </textarea><br>
        3)Wewnętrzny arkusz stylów. <br>
        <textarea disabled>
            <head> 
<style type="text/css"> 
selektor1 { cecha: wartość; cecha2: wartość2... } 
selektor2 { cecha: wartość; cecha2: wartość2... } 
</style> 
</head>
        </textarea><br>
        4)Alternatywny arkusz stylów. <br>
        <textarea disabled style="resize:none;  width: 700px; height: 100px;">
            head> 
<link rel="Stylesheet" type="text/css" href="style.css" title="Nazwa domyślna" /> 
<link rel="Alternate stylesheet" type="text/css" href="style1.css" title="Nazwa 1" /> 
<link rel="Alternate stylesheet" type="text/css" href="style2.css" title="Nazwa 2" /> 
</head>
        </textarea><br>
        5)Import arkusza stylów. <br>
        <textarea disabled>
            <style type="text/css"> 
@import url(adres zewnętrznego arkusza stylów); 
</style>
        </textarea><br>

    </body>
</html>
